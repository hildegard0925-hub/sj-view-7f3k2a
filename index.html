<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SweetJelly 조회</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

table {
    white-space: nowrap;
    overflow-x: auto;
    display: block;
}
th {
    position: sticky;
    top: 0;
    background: #f0f0f0;
    z-index: 5;
}

body {
    font-family: sans-serif;
    margin: 10px;
}

h2 {
    margin-top: 20px;
}

button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
}

input {
    width: 300px;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 16px;
}

.item {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    background-color: #f9f9f9;
}
#topBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px 16px;
    font-size: 16px;
    border-radius: 8px;
    background: #333;
    color: white;
    border: none;
}
</style>

</head>

<body>

<h2>SweetJelly 조회</h2>

<button onclick="loadTasks()">업무</button>
<button onclick="loadFunds()">지출</button>
<button onclick="loadEmployees()">직원</button>

<input type="text" id="search" placeholder="검색" onkeyup="filterItems()">

<br>

<label>시작일</label>
<input type="date" id="startDate">

<label>종료일</label>
<input type="date" id="endDate">

<button onclick="applyDateFilter()">조회</button>
<button onclick="resetDateFilter()">전체</button>

<div id="list"></div>

<script>

function setDefaultMonth() {

    const today = new Date();

    const firstDay =
        new Date(
            today.getFullYear(),
            today.getMonth(),
            1
        );

    const lastDay =
        new Date(
            today.getFullYear(),
            today.getMonth() + 1,
            0
        );

    document.getElementById("startDate").value =
        firstDay.toISOString().slice(0, 10);

    document.getElementById("endDate").value =
        lastDay.toISOString().slice(0, 10);

}

function applyDateFilter() {

    const start =
        document.getElementById("startDate").value;

    const end =
        document.getElementById("endDate").value;

    if (!start || !end) return;

    const filtered =
        currentData.filter(item => {

            const date =
                item.date ||
                item.pay_date;

            if (!date) return true;

            return (
                date >= start &&
                date <= end
            );

        });

    render(filtered);

}

function resetDateFilter() {

    render(currentData);

}

let currentData = [];

function loadTasks() {
    fetch("tasks.json?t=" + new Date().getTime(), {
        cache: "no-store"
    })
        .then(res => res.json())
        .then(data => {
            currentData = data;
            render(data);
        });
}

function loadFunds() {
    fetch("funds.json?t=" + new Date().getTime(), {
        cache: "no-store"
    })
        .then(res => res.json())
        .then(data => {
            currentData = data;
            render(data);
        });
}

function loadEmployees() {
    fetch("employees.json?t=" + new Date().getTime(), {
        cache: "no-store"
    })
        .then(res => res.json())
        .then(data => {

            data.sort(
                (a, b) =>
                    Number(a.employee_no) -
                    Number(b.employee_no)
            );

            currentData = data;

            render(data);

        });
}

function render(data) {

    const list = document.getElementById("list");

    list.innerHTML = "";

    if (data.length === 0) {
        list.innerHTML = "데이터 없음";
        return;
    }

    const table = document.createElement("table");

    table.style.width = "100%";
    table.style.borderCollapse = "collapse";
    table.style.fontSize = "14px";

    // 헤더 생성
    const header = document.createElement("tr");

    let columns = [];

    if (data[0].title) {
        columns = ["제목", "일자", "구분", "상태", "내용", "회사"];
    }

    else if (data[0].vendor) {
        columns = ["일자", "업체", "내용", "금액", "계좌", "회사"];
    }

    else if (data[0].name) {
        columns = [
            "사번",
            "이름",
            "주민번호",
            "입사일",
            "부서",
            "직급",
            "핸드폰",
            "계약구분",
            "계약종료일",
            "급여",
            "연봉",
            "퇴사일",
            "휴직상태"
        ];
    }

    columns.forEach(col => {

        const th = document.createElement("th");

        th.innerText = col;

        th.style.border = "1px solid #ccc";
        th.style.padding = "6px";
        th.style.background = "#f0f0f0";

        header.appendChild(th);

    });

    table.appendChild(header);

    // 데이터 행 생성
    data.forEach(item => {

        const row = document.createElement("tr");

        let values = [];

        if (item.title) {
            values = [
                item.title,
                item.date,
                item.category,
                item.status,
                item.content,
                item.company
            ];
        }

        else if (item.vendor) {
            values = [
                item.pay_date,
                item.vendor,
                item.description,
                item.amount,
                item.account,
                item.company
            ];
        }

        else if (item.name) {

            values = [
                item.employee_no,
                item.name,
                item.resident_no,
                item.hire_date,
                item.department,
                item.position,
                item.phone_mobile,
                item.contract_type,
                item.contract_end_date,
                item.salary,
                item.annual_salary,
                item.retire_date,
                item.leave_status
            ];

        }

        values.forEach(val => {

            const td = document.createElement("td");

            if (
                val !== null &&
                val !== "" &&
                !isNaN(val)
            ) {

                td.innerText =
                    Number(val).toLocaleString();

                td.style.textAlign =
                    "right";

            }

            else {

                td.innerText =
                    val ?? "";

                td.style.textAlign =
                    "left";

            }

            td.style.border =
                "1px solid #ddd";

            td.style.padding =
                "6px";

            row.appendChild(td);

        });

        table.appendChild(row);

    });

    list.appendChild(table);

}
    
function filterItems() {

    const keyword =
        document
        .getElementById("search")
        .value
        .toLowerCase();

    const filtered =
        currentData.filter(item =>
            JSON.stringify(item)
                .toLowerCase()
                .includes(keyword)
        );

    render(filtered);

}
// 페이지 열리면 자동으로 업무 로드
window.onload = function() {

    setDefaultMonth();

    loadTasks();

};
function scrollToTop() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
}
</script>
<button id="topBtn" onclick="scrollToTop()">↑</button>
</body>
</html>
