<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SweetJelly 조회</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

table {
    width: 100%;
    border-collapse: collapse;
}

.table-wrapper {
    overflow-x: auto;
}
th {
    position: sticky;
    top: 0;
    background: #f0f0f0;
    z-index: 10;
}
td.content-cell {
    min-width: 280px;     /* 너무 좁아지지 않게 */
    max-width: 420px;     /* 너무 길어지지 않게 */
    white-space: normal;  /* 줄바꿈 허용 */
    word-break: keep-all; /* 한글 단어 단위 유지 */
}
th, td {
    white-space: nowrap;
}
body {
    font-family: sans-serif;
    margin: 10px;
}

h2 {
    margin-top: 20px;
}

button {
    height: 30px;
    padding: 3px 10px;
    font-size: 14px;
}

input {
    padding: 4px 8px;
    font-size: 14px;
}
input[type="text"],
input[type="date"] {
    height: 30px;
    box-sizing: border-box;
}
.item {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    background-color: #f9f9f9;
}
#topBtn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 12px 16px;
    font-size: 16px;
    border-radius: 8px;
    background: #333;
    color: white;
    border: none;
}
/* 전체 간격 */
.control-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

/* 버튼 줄 */
.button-row {
    display: flex;
    gap: 6px;
}

/* 날짜 줄 */
.date-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

/* 날짜-버튼 묶음 */
.date-buttons {
    display: flex;
    gap: 6px;
}
@media (max-width: 600px) {

    .date-row {
        display: grid;
        grid-template-columns: 1fr;
        gap: 6px;
    }

    .date-buttons {
        display: flex;
        gap: 6px;
    }

}
</style>

</head>

<body>

<h2>SweetJelly 조회</h2>

<div class="control-area">

    <div class="button-row">
        <button onclick="loadTasks()">업무</button>
        <button onclick="loadFunds()">지출</button>
        <button onclick="loadEmployees()">직원</button>
    </div>

    <input type="text" id="search" placeholder="검색" onkeyup="filterItems()">

    <div class="date-row">

        <div class="date-start">
            <label>시작일</label>
            <input type="date" id="startDate">
        </div>

        <div class="date-end">
            <label>종료일</label>
            <input type="date" id="endDate">
        </div>

        <div class="date-buttons">
            <button onclick="applyDateFilter()">조회</button>
            <button onclick="resetDateFilter()">전체</button>
        </div>

    </div>

</div>

<div id="list"></div>

<script>

function setDefaultMonth() {

    const today = new Date();

    const year =
        today.getFullYear();

    const month =
        today.getMonth();

    const firstDay =
        new Date(year, month, 1);

    const lastDay =
        new Date(year, month + 1, 0);

    function formatDate(date) {

        const y =
            date.getFullYear();

        const m =
            String(date.getMonth() + 1)
            .padStart(2, "0");

        const d =
            String(date.getDate())
            .padStart(2, "0");

        return y + "-" + m + "-" + d;

    }

    document.getElementById("startDate").value =
        formatDate(firstDay);

    document.getElementById("endDate").value =
        formatDate(lastDay);

}

function applyDateFilter() {

    const start =
        document.getElementById("startDate").value;

    const end =
        document.getElementById("endDate").value;

    if (!start || !end) {

        render(currentData);

        return;

    }

    const filtered =
        currentData.filter(item => {

            const date =
                item.date ||
                item.pay_date;

            if (!date) return true;

            return (
                date >= start &&
                date <= end
            );

        });

    render(filtered);

}

function resetDateFilter() {

    render(currentData);

}

let currentData = [];

function loadTasks() {
    fetch("tasks.json?t=" + new Date().getTime(), {
        cache: "no-store"
    })
        .then(res => res.json())
        .then(data => {

            currentData = data;

            applyDateFilter();

        });
}

function loadFunds() {
    fetch("funds.json?t=" + new Date().getTime(), {
        cache: "no-store"
    })
        .then(res => res.json())
        .then(data => {

            currentData = data;

            applyDateFilter();

        });
}

function loadEmployees() {
    fetch("employees.json?t=" + new Date().getTime(), {
        cache: "no-store"
    })
        .then(res => res.json())
        .then(data => {

            data.sort(function(a, b) {

                const aStr = (a.employee_no || "").trim();
                const bStr = (b.employee_no || "").trim();

                const aIsNumber = /^\d+$/.test(aStr);
                const bIsNumber = /^\d+$/.test(bStr);

                // 숫자만 있는 사번을 먼저
                if (aIsNumber && !bIsNumber) return -1;
                if (!aIsNumber && bIsNumber) return 1;

                // 둘 다 숫자면 숫자 정렬
                if (aIsNumber && bIsNumber) {
                    return Number(aStr) - Number(bStr);
                }

                // 둘 다 문자 포함이면 문자열 정렬
                return aStr.localeCompare(bStr);

            });

            currentData = data;

            render(data);

        });
}

function render(data) {

    const list = document.getElementById("list");

    list.innerHTML = "";

    if (data.length === 0) {
        list.innerHTML = "데이터 없음";
        return;
    }

    const table = document.createElement("table");

    table.style.width = "100%";
    table.style.borderCollapse = "collapse";
    table.style.fontSize = "14px";

    // 헤더 생성
    const header = document.createElement("tr");

    let columns = [];

    if (data[0].title) {
        columns = ["제목", "일자", "구분", "상태", "내용", "회사"];
    }

    else if (data[0].vendor) {
        columns = ["일자", "업체", "내용", "금액", "계좌", "회사"];
    }

    else if (data[0].name) {
        columns = [
            "사번",
            "이름",
            "주민번호",
            "입사일",
            "부서",
            "직급",
            "핸드폰",
            "계약구분",
            "계약종료일",
            "급여",
            "연봉",
            "퇴사일",
            "휴직상태"
        ];
    }

    columns.forEach(col => {

        const th = document.createElement("th");

        th.innerText = col;

        th.style.border = "1px solid #ccc";
        th.style.padding = "6px";
        th.style.background = "#f0f0f0";

        header.appendChild(th);

    });

    table.appendChild(header);

    // 데이터 행 생성
    data.forEach(item => {

        const row = document.createElement("tr");

        let values = [];

        if (item.title) {
            values = [
                item.title,
                item.date,
                item.category,
                item.status,
                item.content,
                item.company
            ];
        }

        else if (item.vendor) {
            values = [
                item.pay_date,
                item.vendor,
                item.description,
                item.amount,
                item.account,
                item.company
            ];
        }

        else if (item.name) {

            values = [
                item.employee_no,
                item.name,
                item.resident_no,
                item.hire_date,
                item.department,
                item.position,
                item.phone_mobile,
                item.contract_type,
                item.contract_end_date,
                item.salary,
                item.annual_salary,
                item.retire_date,
                item.leave_status
            ];

        }

        values.forEach((val, index) => {

            const td = document.createElement("td");

            // 업무 "내용" 컬럼에만 줄바꿈 적용
            if (
                data[0].title &&
                index === 4
            ) {
                td.className = "content-cell";
            }

            if (
                val !== null &&
                val !== "" &&
                !isNaN(val)
            ) {

                td.innerText =
                    Number(val).toLocaleString();

                td.style.textAlign =
                    "right";

            }

            else {

                td.innerText =
                    val ?? "";

                td.style.textAlign =
                    "left";

            }

            td.style.border =
                "1px solid #ddd";

            td.style.padding =
                "6px";

            row.appendChild(td);

        });

        table.appendChild(row);

    });

    const wrapper = document.createElement("div");
    wrapper.className = "table-wrapper";

    wrapper.appendChild(table);
    list.appendChild(wrapper);

    }
    
function filterItems() {

    const keyword =
        document
        .getElementById("search")
        .value
        .toLowerCase();

    const filtered =
        currentData.filter(item =>
            JSON.stringify(item)
                .toLowerCase()
                .includes(keyword)
        );

    render(filtered);

}
// 페이지 열리면 자동으로 업무 로드
window.onload = function() {

    setDefaultMonth();

    loadTasks();

    // 데이터 로드 후 필터 적용
    setTimeout(function() {

        applyDateFilter();

    }, 200);

};
function scrollToTop() {
    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
}
</script>
<button id="topBtn" onclick="scrollToTop()">↑</button>
</body>
</html>
