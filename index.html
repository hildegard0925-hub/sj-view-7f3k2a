<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SweetJelly 조회</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

table {
    font-size: 13px;
}

th {
    position: sticky;
    top: 0;
}
body {
    font-family: sans-serif;
    margin: 10px;
}

h2 {
    margin-top: 20px;
}

button {
    padding: 10px;
    margin: 5px;
    font-size: 16px;
}

input {
    width: 400px;
    padding: 10px;
    margin-bottom: 10px;
    font-size: 16px;

    position: sticky;
    top: 0;
    background-color: white;
    z-index: 10;
}

.item {
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    background-color: #f9f9f9;
}
</style>

</head>

<body>

<h2>SweetJelly 조회</h2>

<button onclick="loadTasks()">업무</button>
<button onclick="loadFunds()">지출</button>
<button onclick="loadEmployees()">직원</button>

<input type="text" id="search" placeholder="검색" onkeyup="filterItems()">

<div id="list"></div>

<script>

let currentData = [];

function loadTasks() {
    fetch("tasks.json?t=" + new Date().getTime(), {
        cache: "no-store"
    })
        .then(res => res.json())
        .then(data => {
            currentData = data;
            render(data);
        });
}

function loadFunds() {
    fetch("funds.json?t=" + new Date().getTime(), {
        cache: "no-store"
    })
        .then(res => res.json())
        .then(data => {
            currentData = data;
            render(data);
        });
}

function loadEmployees() {
    fetch("employees.json?t=" + new Date().getTime(), {
        cache: "no-store"
    })
        .then(res => res.json())
        .then(data => {
            currentData = data;
            render(data);
        });
}

function render(data) {

    const list = document.getElementById("list");

    list.innerHTML = "";

    if (data.length === 0) {
        list.innerHTML = "데이터 없음";
        return;
    }

    const table = document.createElement("table");

    table.style.width = "100%";
    table.style.borderCollapse = "collapse";
    table.style.fontSize = "14px";

    // 헤더 생성
    const header = document.createElement("tr");

    let columns = [];

    if (data[0].title) {
        columns = ["제목", "일자", "구분", "상태", "내용", "회사"];
    }

    else if (data[0].vendor) {
        columns = ["일자", "업체", "내용", "금액", "계좌", "회사"];
    }

    else if (data[0].name) {
        columns = ["이름", "부서", "직급", "입사일", "계약구분"];
    }

    columns.forEach(col => {

        const th = document.createElement("th");

        th.innerText = col;

        th.style.border = "1px solid #ccc";
        th.style.padding = "6px";
        th.style.background = "#f0f0f0";

        header.appendChild(th);

    });

    table.appendChild(header);

    // 데이터 행 생성
    data.forEach(item => {

        const row = document.createElement("tr");

        let values = [];

        if (item.title) {
            values = [
                item.title,
                item.date,
                item.category,
                item.status,
                item.content,
                item.company
            ];
        }

        else if (item.vendor) {
            values = [
                item.pay_date,
                item.vendor,
                item.description,
                item.amount,
                item.account,
                item.company
            ];
        }

        else if (item.name) {
            values = [
                item.name,
                item.department,
                item.position,
                item.hire_date,
                item.contract_type
            ];
        }

        values.forEach(val => {

            const td = document.createElement("td");

            td.innerText = val ?? "";

            td.style.border = "1px solid #ddd";
            td.style.padding = "6px";

            row.appendChild(td);

        });

        table.appendChild(row);

    });

    list.appendChild(table);

}

function filterItems() {

    const keyword =
        document
        .getElementById("search")
        .value
        .toLowerCase();

    const filtered =
        currentData.filter(item =>
            JSON.stringify(item)
                .toLowerCase()
                .includes(keyword)
        );

    render(filtered);

}
// 페이지 열리면 자동으로 업무 로드
window.onload = function() {

    loadTasks();

};
// 30초마다 자동 새로고침
setInterval(function() {

    location.reload();

}, 30000);

</script>

</body>
</html>
